name: Feature request
description: Suggest a capability or improvement (not a new device - use the device-support template for that).
labels: ["enhancement"]
title: "[Feature] "
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case or the friction you hit. Focus on the "why" before the "how".
      placeholder: I'd like watch() to also fire when the PLU/unit price changes, not just the weight.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like pydigi to do? A new API, a CLI flag, a behavior change?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other designs you weighed.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I've read DESIGN.md and this fits the library's layered, extend-by-subclassing design.
          required: false
        - label: I'd be willing to help implement or test this.
          required: false
